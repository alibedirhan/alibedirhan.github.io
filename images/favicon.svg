<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <!-- Terminal window -->
  <rect width="32" height="32" rx="5" fill="#0F0E0C"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="32" height="8" fill="#1E1B15"/>
  <!-- Traffic lights -->
  <circle cx="4.5" cy="4" r="1.2" fill="#E8A547" opacity="0.85"/>
  <circle cx="8" cy="4" r="1.2" fill="#E8A547" opacity="0.55"/>
  <circle cx="11.5" cy="4" r="1.2" fill="#E8A547" opacity="0.3"/>
  <!-- Prompt symbol: > and cursor block -->
  <text x="4.5" y="24" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="600" fill="#E8A547" letter-spacing="-0.5">&gt;_</text>
</svg>
